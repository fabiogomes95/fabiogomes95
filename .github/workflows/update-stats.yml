name: Update README cards

on:
  schedule:
    # Roda automaticamente todos os dias à meia-noite (UTC)
    - cron: "0 0 * * *" 
  workflow_dispatch: # Permite rodar o script manualmente clicando em um botão

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          # Você pode mudar o tema aqui, adicionei o 'radical' como exemplo
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=radical'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate top languages card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&layout=compact&theme=radical'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: atualiza as estatisticas do github" || exit 0
          git push
